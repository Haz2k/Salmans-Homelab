version: "1"
services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped

    ports:
      - "8082:8080"

    volumes:
      - /home/salman/utility-stack/config/filebrowser:/config
      - /media:/srv/media
      - /mnt/storage:/srv/storage

    command:
      - --config=/config/settings.json
      - --database=/config/filebrowser.db
      - --root=/srv
      - --address=0.0.0.0
      - --port=8080

    environment:
      - PUID=1000
      - PGID=1000
